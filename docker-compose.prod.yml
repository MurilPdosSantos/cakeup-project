version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cakeup-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - cakeup-net

  frontend:
    build:
      context: ./frontend
    container_name: cakeup-frontend
    networks:
      - cakeup-net

  backend:
    build:
      context: ./backend
    container_name: cakeup-backend
    environment:
      APP_PORT: ${APP_PORT:-3000}
      APP_CORS_ORIGIN: ${APP_CORS_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-change_me_use_strong_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-cakeup}
      DB_PASSWORD: ${DB_PASSWORD:-cakeup}
      DB_NAME: ${DB_NAME:-cakeup}
      NODE_ENV: production
    depends_on:
      - redis
      - postgres
    networks:
      - cakeup-net
    env_file:
      - ./.env
      - ./backend/.env

  redis:
    image: redis:7-alpine
    container_name: cakeup-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cakeup-net

  postgres:
    image: postgres:16-alpine
    container_name: cakeup-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cakeup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cakeup}
      POSTGRES_DB: ${POSTGRES_DB:-cakeup}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - cakeup-net

volumes:
  redis_data:
  pg_data:

networks:
  cakeup-net:
    driver: bridge
