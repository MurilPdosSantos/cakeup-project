server {
    listen 80;
    server_name painel-cakeup.com cakeupadmin.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name painel-cakeup.com;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $frontend_upstream cakeup-frontend;
    set $backend_upstream cakeup-backend:3000;

    ssl_certificate /etc/letsencrypt/live/painel-cakeup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/painel-cakeup.com/privkey.pem;

    location / {
        proxy_pass http://$frontend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://$backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://$backend_upstream/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name cakeupadmin.com;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $backend_upstream cakeup-backend:3000;

    ssl_certificate /etc/letsencrypt/live/cakeupadmin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cakeupadmin.com/privkey.pem;

    location /api/ {
        proxy_pass http://$backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://$backend_upstream/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
