version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cakeup-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cakeup-net

  frontend:
    image: node:20-alpine
    container_name: cakeup-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
    expose:
      - "5173"
    networks:
      - cakeup-net

  backend:
    image: node:20-alpine
    container_name: cakeup-backend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run start"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      APP_PORT: ${APP_PORT:-3000}
      APP_CORS_ORIGIN: ${APP_CORS_ORIGIN:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:5173,http://127.0.0.1:5173}
      JWT_SECRET: ${JWT_SECRET:-change_me_use_strong_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-cakeup}
      DB_PASSWORD: ${DB_PASSWORD:-cakeup}
      DB_NAME: ${DB_NAME:-cakeup}
    volumes:
      - ./backend:/app
    expose:
      - "3000"
    depends_on:
      - redis
      - postgres
    networks:
      - cakeup-net
    env_file:
      - ./.env
      - ./backend/.env

  redis:
    image: redis:7-alpine
    container_name: cakeup-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cakeup-net

  postgres:
    image: postgres:16-alpine
    container_name: cakeup-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cakeup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cakeup}
      POSTGRES_DB: ${POSTGRES_DB:-cakeup}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - cakeup-net

volumes:
  redis_data:
  pg_data:

networks:
  cakeup-net:
    driver: bridge
